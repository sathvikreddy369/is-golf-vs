services:
  - type: web
    name: golf-charity-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: FRONTEND_ORIGIN
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_PLAN_MONTHLY_ID
        sync: false
      - key: RAZORPAY_PLAN_YEARLY_ID
        sync: false
      - key: RAZORPAY_PLAN_MONTHLY_AMOUNT_CENTS
        value: 100000
      - key: RAZORPAY_PLAN_YEARLY_AMOUNT_CENTS
        value: 1000000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: BACKEND_INTERNAL_API_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
